<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Gate Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smart Gate">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="card">
            <h1>🔐 Acesso Seguro</h1>
            <p>Digite sua senha mestre</p>
            <input type="password" id="passwordInput" placeholder="Senha">
            <button onclick="fazerLogin()" id="btnLogin">ENTRAR</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <div class="top-bar">
            <span>Smart Gate 🏠</span>
            <button onclick="fazerLogout()" class="btn-logout">Sair</button>
        </div>

        <div class="status-container">
            <div id="statusIndicator" class="status-circle"></div>
            <h2 id="statusText">Conectando...</h2>
        </div>

        <div class="control-area">
            <button id="btnOpen" onclick="interagirPortao()">
                <div class="icon-power" id="iconBtn">⚡</div>
            </button>
            
            <div id="progressContainer" class="progress-container hidden">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            
            <p id="btnLabel">Carregando...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
